<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeenChat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <h2>Friends</h2>

    <div class="friend">Alex 🟢</div>
    <div class="friend">Mia 🟢</div>
    <div class="friend">Jordan 🔴</div>

    <button id="group-btn">+ Group Chat</button>
  </aside>

  <div class="app">

    <header>
      <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png" class="avatar">

        <div>
          <h1>TeenChat</h1>
          <p>your ai friend</p>
        </div>
      </div>

      <button id="theme-btn">🌙</button>
    </header>

    <main id="chat-box">

      <div class="message ai">
        yooo 👋 i'm TeenChat
      </div>

    </main>

    <div id="typing" class="typing hidden">
      TeenChat is typing...
    </div>

    <div class="input-area">
      <input
        type="text"
        id="user-input"
        placeholder="Type a message..."
      >

      <button id="voice-btn">🎤</button>

      <button id="send-btn">Send</button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
