<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TeenChat</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <aside class="sidebar">

    <h2>TeenChat</h2>

    <button id="new-chat-btn">
      + New Chat
    </button>

    <div id="chat-history"></div>

  </aside>

  <div class="app">

    <header>
      <h1>TeenChat AI</h1>
    </header>

    <main id="chat-box"></main>

    <div class="input-area">

      <input
        type="text"
        id="user-input"
        placeholder="Message TeenChat..."
      >

      <button id="send-btn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
