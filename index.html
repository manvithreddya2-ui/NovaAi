<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TeenChat AI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <header>
      <h1>TeenChat</h1>
      <p>Your AI friend for chatting and learning</p>
    </header>

    <main id="chat-box">

      <div class="message ai">
        Hey! I'm TeenChat 🤖
      </div>

    </main>

    <div class="input-area">

      <input
        type="text"
        id="user-input"
        placeholder="Type a message..."
        autocomplete="off"
      />

      <button id="send-btn">
        Send
      </button>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
