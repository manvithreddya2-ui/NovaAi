<!DOCTYPE html>
<html>

<head>

  <title>TeenChat</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="sidebar">

    <h2>TeenChat</h2>

    <button id="new-chat-btn">
      + New Chat
    </button>

    <div id="chat-history"></div>

  </div>

  <div class="app">

    <header>
      <h1>TeenChat AI</h1>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">

      <input
        id="user-input"
        placeholder="Message TeenChat..."
      >

      <button id="send-btn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
